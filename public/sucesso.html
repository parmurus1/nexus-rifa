<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pagamento Confirmado — Nexus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--red:#e8220a;--red-glow:rgba(232,34,10,0.18);--bg:#0c0c0c;--bg2:#141414;--bg3:#1c1c1c;--border:rgba(255,255,255,0.08);--border-s:rgba(255,255,255,0.15);--text:#f0ede8;--text2:#888;--text3:#444;--glass:rgba(12,12,12,0.88);--radius:16px;--radius-sm:8px;--tr:0.35s cubic-bezier(0.4,0,0.2,1);}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
    body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 40px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .nav-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 2.5s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}
    .nav-logo img{height:34px;width:auto;object-fit:contain;}
    .nav-link{font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2);text-decoration:none;transition:color var(--tr);}
    .nav-link:hover{color:var(--red);}

    .page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:100px 24px 60px;position:relative;overflow:hidden;}
    .orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.08;pointer-events:none;}
    .orb1{width:600px;height:600px;background:#1a6040;top:-200px;left:-100px;}
    .orb2{width:400px;height:400px;background:var(--red);bottom:-100px;right:-100px;opacity:0.05;}
    .grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 0%,transparent 100%);pointer-events:none;}

    .box{background:var(--bg2);border:1px solid rgba(29,160,80,0.3);border-radius:var(--radius);padding:56px 48px;text-align:center;max-width:480px;width:100%;position:relative;z-index:1;animation:fu 0.6s ease forwards;}
    @keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .box::before{content:'';position:absolute;inset:0;border-radius:var(--radius);background:radial-gradient(ellipse at top,rgba(29,160,80,0.06) 0%,transparent 70%);pointer-events:none;}

    .icon-wrap{width:72px;height:72px;border-radius:50%;background:rgba(29,160,80,0.12);border:1px solid rgba(29,160,80,0.3);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 24px;}
    .label{font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.25em;text-transform:uppercase;color:#1d9e50;margin-bottom:10px;}
    h1{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:0.04em;color:var(--text);margin-bottom:12px;line-height:1;}
    p{font-size:0.9rem;color:var(--text2);line-height:1.75;margin-bottom:32px;}
    .btn{display:inline-block;background:var(--red);color:#fff;padding:14px 32px;border-radius:var(--radius-sm);font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.12em;text-decoration:none;transition:all var(--tr);}
    .btn:hover{background:#ff2a10;transform:translateY(-2px);box-shadow:0 8px 24px var(--red-glow);}

    footer{position:fixed;bottom:0;left:0;right:0;border-top:1px solid var(--border);padding:16px 40px;color:var(--text3);font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;display:flex;align-items:center;gap:8px;background:var(--glass);backdrop-filter:blur(20px);}
    footer img{height:18px;opacity:0.3;}
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><div class="nav-dot"></div><img src="/imgs/nexusicon.png" alt="Nexus"/></a>
  <a href="/admin.html" class="nav-link">Admin</a>
</nav>
<div class="page">
  <div class="grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="box">
    <div class="icon-wrap">🎸</div>
    <div class="label">Pagamento confirmado</div>
    <h1>TUDO CERTO!</h1>
    <p>Seu(s) bilhete(s) foi(ram) registrado(s) com sucesso.<br/>Boa sorte no sorteio — você está apoiando a música!</p>
    <a href="/" class="btn">Voltar ao site</a>
  </div>
</div>
<footer><img src="/imgs/nexusicon.png" alt="Nexus"/>© 2025 Nexus Band</footer>
</body>
</html>
